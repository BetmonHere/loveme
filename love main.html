<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💕 Do You Love Me?</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Pacifico&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe0f0 0%, #ffd6e7 40%, #ffc8e0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .heart-float {
      position: absolute;
      bottom: -60px;
      animation: floatUp linear infinite;
      opacity: 0.5;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.5; }
      100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      border-radius: 36px;
      padding: 50px 60px 44px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(255,100,160,0.18), 0 4px 16px rgba(255,100,160,0.1);
      max-width: 420px;
      width: 90%;
      animation: cardIn 0.7s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.7) translateY(40px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 2rem;
      color: #e8448a;
      margin-bottom: 10px;
      text-shadow: 0 2px 8px rgba(232,68,138,0.15);
    }
    .heart-deco {
      font-size: 2rem;
      display: block;
      margin-bottom: 8px;
      animation: heartbeat 1.2s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    .subtitle {
      color: #f4799a;
      font-size: 1rem;
      margin-bottom: 36px;
      font-weight: 700;
    }

    /* Both buttons identical size & style */
    .btn-yes,
    .btn-no {
      background: linear-gradient(135deg, #ff6ea0, #ff3d88);
      color: white;
      border: none;
      border-radius: 50px;
      width: 130px;
      height: 54px;
      font-size: 1.15rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(255,61,136,0.35);
      letter-spacing: 0.5px;
    }

    .btn-yes {
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-yes:hover, .btn-yes:active {
      transform: scale(1.08) translateY(-2px);
      box-shadow: 0 10px 32px rgba(255,61,136,0.45);
    }

    /* No button fixed-positioned, floats away */
    .btn-no {
      position: fixed;
      z-index: 50;
      transition: left 0.32s cubic-bezier(.34,1.56,.64,1),
                  top  0.32s cubic-bezier(.34,1.56,.64,1),
                  transform 0.32s ease,
                  opacity 0.4s ease;
      user-select: none;
      -webkit-user-select: none;
    }

    #yes-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: linear-gradient(135deg, #ffe0f0, #ffc2d9, #ffadc9);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeInScreen 0.5s ease both;
    }
    @keyframes fadeInScreen {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }
    #yes-screen.show { display: flex; }

    #yes-screen .yes-gif {
      width: 230px;
      height: 230px;
      object-fit: contain;
      animation: yesGifPop 0.7s cubic-bezier(.34,1.56,.64,1) both;
      margin-bottom: 20px;
    }
    @keyframes yesGifPop {
      from { transform: scale(0) rotate(-15deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    #yes-screen h2 {
      font-family: 'Pacifico', cursive;
      font-size: 2.4rem;
      color: #e8448a;
      text-shadow: 0 3px 12px rgba(232,68,138,0.25);
      margin-bottom: 10px;
      animation: popIn 0.5s 0.25s cubic-bezier(.34,1.56,.64,1) both;
    }
    #yes-screen p {
      font-size: 1.1rem;
      color: #f4799a;
      font-weight: 700;
      animation: popIn 0.5s 0.4s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    .burst-heart {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      animation: burstOut 1.2s ease-out forwards;
      font-size: 1.8rem;
    }
    @keyframes burstOut {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.2); }
    }
  </style>
</head>
<body>

  <div class="hearts-bg" id="heartsBg"></div>

  <div class="card" id="mainCard">
    <h1>Do You Love Me?</h1>
    <span class="heart-deco">💕</span>
    <p class="subtitle">Choose wisely~ 👀✨</p>
    <div style="display:flex; gap:18px; justify-content:center; align-items:center;">
      <button class="btn-yes" onclick="onYes()">Yes</button>
      <!-- placeholder keeps card width stable -->
      <div style="width:130px; height:54px;"></div>
    </div>
  </div>

  <button class="btn-no" id="noBtn">No</button>

    <h2>Yay!! 🎉💕</h2>
    <p>I knew it! I love you too!! 🐻💗</p>
  </div>

  <script>
    // Floating hearts
    const heartsBg = document.getElementById('heartsBg');
    const emojis = ['💕','💗','💖','💓','🌸','✨','💝','🩷'];
    for (let i = 0; i < 20; i++) {
      const h = document.createElement('span');
      h.className = 'heart-float';
      h.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      h.style.left = Math.random()*100 + 'vw';
      h.style.fontSize = (1 + Math.random()*1.4) + 'rem';
      const dur = 5 + Math.random()*8;
      h.style.animationDuration = dur + 's';
      h.style.animationDelay = -(Math.random()*dur) + 's';
      heartsBg.appendChild(h);
    }

    // No button: position beside Yes on load
    const noBtn = document.getElementById('noBtn');
    let noAttempts = 0;
    let moving = false;

    function placeNoInitial() {
      const yesBtn = document.querySelector('.btn-yes');
      const r = yesBtn.getBoundingClientRect();
      noBtn.style.transition = 'none';
      noBtn.style.left = (r.right + 18) + 'px';
      noBtn.style.top  = r.top + 'px';
      noBtn.style.transform = 'none';
      noBtn.style.opacity = '1';
      setTimeout(() => {
        noBtn.style.transition = 'left 0.32s cubic-bezier(.34,1.56,.64,1), top 0.32s cubic-bezier(.34,1.56,.64,1), transform 0.32s ease, opacity 0.4s ease';
      }, 100);
    }

    window.addEventListener('load', placeNoInitial);
    window.addEventListener('resize', () => { if (noAttempts === 0) placeNoInitial(); });

    function escapeNoBtn(e) {
      if (moving) return;
      moving = true;
      noAttempts++;

      if (noAttempts > 45) {
        noBtn.style.transform = 'scale(0.1) rotate(720deg)';
        noBtn.style.opacity = '0';
        setTimeout(() => noBtn.style.display = 'none', 500);
        moving = false;
        return;
      }

      const margin = 20;
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const bw = noBtn.offsetWidth;
      const bh = noBtn.offsetHeight;

      let cx = vw/2, cy = vh/2;
      if (e.clientX !== undefined) { cx = e.clientX; cy = e.clientY; }
      else if (e.touches && e.touches[0]) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }

      let nx, ny, dist = 0, tries = 0;
      do {
        nx = margin + Math.random() * (vw - 2*margin - bw);
        ny = margin + Math.random() * (vh - 2*margin - bh);
        dist = Math.hypot(nx - cx, ny - cy);
        tries++;
      } while (dist < 160 && tries < 20);

      const scale = Math.max(0.45, 1 - noAttempts * 0.012);
      const rot   = (Math.random() - 0.5) * 25;

      noBtn.style.left      = nx + 'px';
      noBtn.style.top       = ny + 'px';
      noBtn.style.transform = `scale(${scale}) rotate(${rot}deg)`;

      setTimeout(() => { moving = false; }, 350);
    }

    noBtn.addEventListener('mouseenter', escapeNoBtn);
    noBtn.addEventListener('mousemove',  escapeNoBtn);
    noBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      escapeNoBtn(e);
    }, {passive: false});

    function onYes() {
      for (let i = 0; i < 28; i++) {
        const h = document.createElement('span');
        h.className = 'burst-heart';
        h.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        const angle = (i/28)*Math.PI*2;
        const dist  = 100 + Math.random()*200;
        h.style.setProperty('--tx', (Math.cos(angle)*dist)+'px');
        h.style.setProperty('--ty', (Math.sin(angle)*dist)+'px');
        h.style.left = (window.innerWidth/2 - 14)+'px';
        h.style.top  = (window.innerHeight/2 - 14)+'px';
        h.style.animationDelay = (Math.random()*0.25)+'s';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 1600);
      }
      setTimeout(() => {
        document.getElementById('yes-screen').classList.add('show');
      }, 250);
    }
    window.onYes = onYes;
  </script>
